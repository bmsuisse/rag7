name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check rag7

      - name: Format check
        run: ruff format --check rag7

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install package + test deps
        run: pip install -e ".[duckdb,chromadb]" pytest faker python-dotenv

      - name: Generate fake test data
        run: python tests/generate_fake_data.py

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_mteb_benchmark.py --ignore=tests/eval.py --ignore=tests/test_ir_benchmarks.py --ignore=tests/test_fake_data.py --ignore=tests/test_retrieval.py

  test-backends:
    runs-on: ubuntu-latest
    services:
      pgvector:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
      meilisearch:
        image: getmeili/meilisearch:v1.13
        env:
          MEILI_MASTER_KEY: masterKey
          MEILI_ENV: development
        ports:
          - 7700:7700
        options: >-
          --health-cmd "curl -sf http://localhost:7700/health || exit 1"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.14.0
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + all backend deps
        run: pip install -e ".[all]" pytest faker python-dotenv

      - name: Generate fake test data
        run: python tests/generate_fake_data.py

      - name: Run backend tests
        run: pytest tests/test_backends.py -v --tb=short
